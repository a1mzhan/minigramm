{% extends 'base.html' %}
{% block title %}Новый пост — Minigramm{% endblock %}

{% block content %}
<div class="page">
  <h1 style="font-size:22px;font-weight:700;margin-bottom:24px;">Новая публикация</h1>

  <div class="card" style="padding:28px;">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <!-- Image upload -->
      <div style="margin-bottom:24px;">
        <div id="drop-zone" style="border:2px dashed var(--border);border-radius:14px;padding:48px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;">
          <input type="file" name="image" id="img-input" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;">
          <div id="upload-placeholder">
            <div style="font-size:40px;margin-bottom:12px;">🖼️</div>
            <div style="font-weight:600;margin-bottom:6px;">Выберите или перетащите фото</div>
            <div style="font-size:13px;color:var(--text-muted);">JPG, PNG, WEBP до 10MB</div>
          </div>
          <img id="preview" src="" alt="" style="display:none;max-width:100%;max-height:400px;border-radius:8px;object-fit:contain;">
        </div>
      </div>

      <!-- Caption -->
      <div style="margin-bottom:24px;">
        <label class="form-label">Подпись</label>
        <textarea name="caption" class="form-control" rows="4" placeholder="Расскажите о своём посте... можно без фото!">{{ form.caption.value|default:'' }}</textarea>
      </div>

      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary" style="flex:1;">Опубликовать</button>
        <a href="{% url 'feed' %}" class="btn btn-outline">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const input = document.getElementById('img-input');
const preview = document.getElementById('preview');
const placeholder = document.getElementById('upload-placeholder');
const dropZone = document.getElementById('drop-zone');

input.addEventListener('change', function() {
  if (this.files[0]) showPreview(this.files[0]);
});

function showPreview(file) {
  const reader = new FileReader();
  reader.onload = e => {
    preview.src = e.target.result;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    dropZone.style.borderStyle = 'solid';
    dropZone.style.borderColor = 'var(--accent)';
  };
  reader.readAsDataURL(file);
}

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'var(--border)'; });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    showPreview(file);
  }
});
</script>
{% endblock %}
